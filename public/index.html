<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Visitantes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      color: #444;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    .terms {
      margin-top: 16px;
      font-size: 13px;
      color: #333;
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-primary {
      background: #111827;
      color: white;
    }

    .small {
      margin-top: 16px;
      font-size: 12px;
      color: #666;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
    <div style="text-align: center; margin-bottom: 20px;">
    <img src="/logo.png" alt="Logo Empresa" style="max-width: 160px;">
  </div>
      <h1>Bem-vindo ao Wi-Fi Visitantes</h1>
      <p>Para acessar a internet, informe seus dados e aceite os termos de uso.</p>

      <form action="/login" method="POST">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required minlength="3" />

        <label for="cpf">CPF</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          required
          maxlength="14"
          placeholder="000.000.000-00"
        />

        <div class="terms">
          <label>
            <input type="checkbox" name="aceite" required />
            Declaro que li e aceito os termos de uso e a política de tratamento de dados para controle de acesso à rede visitante.
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Conectar</button>
      </form>

      <div class="small">
        SSID: {{SSID}}<br />
        MAC: {{MAC}}<br />
        IP: {{IP}}
      </div>
    </div>
  </div>

  <script>
    const cpfInput = document.getElementById("cpf");

    cpfInput.addEventListener("input", function (e) {
      let value = e.target.value.replace(/\D/g, "");
      value = value.slice(0, 11);

      if (value.length > 9) {
        value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
      } else if (value.length > 6) {
        value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
      } else if (value.length > 3) {
        value = value.replace(/(\d{3})(\d{1,3})/, "$1.$2");
      }

      e.target.value = value;
    });
  </script>
</body>
</html>
