<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Visitantes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
    }

    p {
      color: #444;
      font-size: 14px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    .terms {
      margin-top: 16px;
      font-size: 13px;
      color: #333;
    }

    .terms a {
      color: #2563eb;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-primary {
      background: #111827;
      color: white;
    }

    .btn-primary:hover {
      background: #1f2937;
    }

    .link-politica {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #111827;
      text-decoration: none;
    }

    .link-politica:hover {
      text-decoration: underline;
    }

    .small {
      margin-top: 16px;
      font-size: 12px;
      color: #666;
      word-break: break-word;
      text-align: center;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      max-width: 160px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="logo">
        <img src="/logo.png" alt="Logo Empresa">
      </div>

      <h1>Bem-vindo ao Wi-Fi Visitantes</h1>
      <p>Para acessar a internet, informe seus dados e aceite os termos de uso.</p>

      <form action="/login" method="POST">

        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required minlength="3" />

        <label for="cpf">CPF</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          required
          maxlength="14"
          placeholder="000.000.000-00"
        />

        <div class="terms">
          <label>
            <input type="checkbox" name="aceite" required />
            Declaro que li e aceito os 
            <a href="/politica.html" target="_blank">termos de uso</a> e a 
            <a href="/politica.html" target="_blank">política de tratamento de dados</a>.
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Conectar</button>

        <a href="/politica.html" target="_blank" class="link-politica">
          Ver política completa
        </a>

      </form>

      <div class="small">
        SSID: {{SSID}}<br />
        MAC: {{MAC}}<br />
        IP: {{IP}}
      </div>

    </div>
  </div>

  <script>
    const cpfInput = document.getElementById("cpf");

    cpfInput.addEventListener("input", function (e) {
      let value = e.target.value.replace(/\D/g, "");
      value = value.slice(0, 11);

      if (value.length > 9) {
        value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
      } else if (value.length > 6) {
        value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
      } else if (value.length > 3) {
        value = value.replace(/(\d{3})(\d{1,3})/, "$1.$2");
      }

      e.target.value = value;
    });
  </script>

</body>
</html>
